<span class="material-symbols-outlined text-[#341706] dark:text-[#fdf9f4] cursor-pointer" data-icon="shopping_bag">shopping_bag</span>

<!-- Main Content: Quiz Step 2 -->
<main class="flex-grow flex flex-col items-center justify-center pt-24 pb-32 px-6">
<!-- Progress Bar Container -->
<div class="w-full max-w-2xl mb-12">

<div class="text-center max-w-3xl mb-16">
<h1 class="font-headline text-4xl md:text-5xl text-primary tracking-tighter mb-4">
                Wie intensiv magst du deinen Kaffee?
            </h1>
<p class="font-body text-on-surface-variant text-lg max-w-lg mx-auto opacity-80">
                Wähle die Rösttiefe, die deinen Gaumen am besten schmeichelt.
            </p>
</div>
<!-- Quiz Options: Minimalist Bento-style Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
<!-- Option 1: Mild -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl text-left transition-all duration-300 hover:shadow-xl hover:shadow-primary/5 border border-outline-variant/15 active:scale-[0.98]">
<div class="mb-6 flex justify-between w-full items-start">
<span class="material-symbols-outlined text-primary/40 group-hover:text-secondary transition-colors" data-icon="light_mode">light_mode</span>
<div class="w-2 h-2 rounded-full border border-secondary group-focus:bg-secondary"></div>
</div>
<h3 class="font-headline text-2xl text-primary mb-2">Mild</h3>
<p class="text-on-surface-variant text-sm leading-relaxed opacity-70">Sanft geröstet mit floralen Noten und einer feinen, hellen Säure. Perfekt für Genießer feiner Nuancen.</p>
</button>
<!-- Option 2: Balanced -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl text-left transition-all duration-300 hover:shadow-xl hover:shadow-primary/5 border border-outline-variant/15 active:scale-[0.98]">
<div class="mb-6 flex justify-between w-full items-start">
<span class="material-symbols-outlined text-primary/40 group-hover:text-secondary transition-colors" data-icon="balance">balance</span>
<div class="w-2 h-2 rounded-full border border-secondary group-focus:bg-secondary"></div>
</div>
<h3 class="font-headline text-2xl text-primary mb-2">Balanced</h3>
<p class="text-on-surface-variant text-sm leading-relaxed opacity-70">Die goldene Mitte. Harmonisches Profil aus nussigen Aromen und dezenter Karamellsüße.</p>
</button>
<!-- Option 3: Intensiv -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl text-left transition-all duration-300 hover:shadow-xl hover:shadow-primary/5 border border-outline-variant/15 active:scale-[0.98]">
<div class="mb-6 flex justify-between w-full items-start">
<span class="material-symbols-outlined text-primary/40 group-hover:text-secondary transition-colors" data-icon="bolt">bolt</span>
<div class="w-2 h-2 rounded-full border border-secondary group-focus:bg-secondary"></div>
</div>
<h3 class="font-headline text-2xl text-primary mb-2">Intensiv</h3>
<p class="text-on-surface-variant text-sm leading-relaxed opacity-70">Kräftige Röstung mit Noten von dunkler Schokolade. Ein vollmundiger Körper für Charakter-Liebhaber.</p>
</button>
<!-- Option 4: Sehr kräftig -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl text-left transition-all duration-300 hover:shadow-xl hover:shadow-primary/5 border border-outline-variant/15 active:scale-[0.98]">
<div class="mb-6 flex justify-between w-full items-start">
<span class="material-symbols-outlined text-primary/40 group-hover:text-secondary transition-colors" data-icon="skillet">skillet</span>
<div class="w-2 h-2 rounded-full border border-secondary group-focus:bg-secondary"></div>
</div>
<h3 class="font-headline text-2xl text-primary mb-2">Sehr kräftig</h3>
<p class="text-on-surface-variant text-sm leading-relaxed opacity-70">Italienische Tradition. Dunkel, rauchig und fast sirupartig. Der ultimative Espresso-Moment.</p>
</button>
</div>

</div>

<script>
document.addEventListener('click', function(e) {
    var t = e.target.closest('button, [class*="cursor-pointer"], a');
    if (!t) return;
    var txt = t.textContent.toLowerCase();
    // Back
    if (txt.includes('zurück') || txt.includes('arrow_back') || t.querySelector('[data-icon="arrow_back"]')) {
        e.preventDefault(); window.location.href = '/quiet_luxury_quiz_1/'; return;
    }
    // Forward / next / result
    if (txt.includes('weiter') || txt.includes('quiz starten') || txt.includes('ergebnis anzeigen') || txt.includes('arrow_forward') || t.querySelector('[data-icon="arrow_forward"]')) {
        e.preventDefault(); window.location.href = '/quiz_brewing_method/'; return;
    }
    // If it's an option card in main
    if (t.closest('main') && (t.tagName === 'BUTTON' || t.hasAttribute('class') && t.getAttribute('class').includes('cursor-pointer'))) {
        window.location.href = '/quiz_brewing_method/';
    }
});
</script>
