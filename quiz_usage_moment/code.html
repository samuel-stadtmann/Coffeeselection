<span class="material-symbols-outlined text-[#341706] dark:text-[#fdf9f4] hover:opacity-70 transition-opacity cursor-pointer">close</span>
</div>
<h1 class="font-notoserif font-normal tracking-tight text-lg font-serif italic text-[#341706] dark:text-[#fdf9f4]">Digital Sommelier</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<main class="pt-24 pb-32 px-6 max-w-4xl mx-auto">
<!-- Progress Section -->
<div class="mb-12">
<div class="flex justify-between items-end mb-4">
<span class="font-label text-[10px] uppercase tracking-[0.1em] text-outline">Schritt 05 / 07</span>
<span class="font-headline italic text-primary text-sm">71% abgeschlossen</span>
</div>
<div class="h-[2px] w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary transition-all duration-1000" style="width: 71%;"></div>
</div>
</div>
<!-- Question Headline -->
<div class="mb-16 text-center">
<h2 class="font-headline text-3xl md:text-4xl text-primary leading-tight tracking-tight mb-4">
                Wann trinkst du hauptsächlich Kaffee?
            </h2>
<p class="font-body text-on-surface-variant font-light tracking-wide max-w-lg mx-auto">
                Der richtige Röstgrad entfaltet sein volles Potenzial je nach Tageszeit und Umfeld.
            </p>
</div>
<!-- Asymmetric Options Grid -->

<!-- Option 1: Morgen -->
<button class="group relative overflow-hidden rounded-xl bg-surface-container-low hover:scale-95 transition-transform duration-300 flex flex-col text-left">
<div class="aspect-[16/9] w-full overflow-hidden">

</div>
<div class="p-6 flex justify-between items-center bg-surface-container-lowest">
<div>
<span class="font-label text-[10px] uppercase tracking-widest text-secondary block mb-1">Erwachen</span>
<h3 class="font-headline text-xl text-primary">Morgen</h3>
</div>
<div class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-sm">radio_button_unchecked</span>
</div>
</div>
</button>
<!-- Option 2: Nachmittags -->

<div class="aspect-[16/9] w-full overflow-hidden">
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" data-alt="Elegant porcelain cup of espresso on a marble cafe table with a delicate pastry in soft focus background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJXgzSPdvKkvdjq_JwFnyXex1iJkKzsfqoX_cfOIcb7uBLrrk7zq7tObmqra79JSCHFGNgmhKQhS75eB-Oux5c9WqdUbLIuaIWMEZDJnDXiShQVa7tr5Z1n7YCCFAq0jGGMNzBH92oDdPOuLoDairag17c_41gTpgz21dcdOf6iKDmQKWWLRb_s61L60bjJziVIdCqOKOlRyp8eVTS4NDxxQ2xw9J3pUQkc-FIn9N6Rgc6DMHg2yjfMwbaZIFU--J44TFfg-rD7DqA"/>
</div>
<div class="p-6 flex justify-between items-center bg-surface-container-lowest">
<div>
<span class="font-label text-[10px] uppercase tracking-widest text-secondary block mb-1">Pause</span>
<h3 class="font-headline text-xl text-primary">Nachmittags</h3>
</div>
<div class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-sm">radio_button_unchecked</span>
</div>
</div>

<div class="flex flex-col md:flex-row h-full">
<div class="md:w-3/5 aspect-[16/9] md:aspect-auto overflow-hidden">
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" data-alt="Modern minimalist office workspace with a clean aesthetic and a sleek thermos flask of fresh coffee" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaXHjsyOURAKC8RuCI4Wqp89O3E2bE-03bgkltqAZyxRvcE64iWoNKkOas5niVGcNDL_Y-x1eSDVkaoAY45K9uSxzApq3Y6Xx5eXAuxyNnm2ko3i0NaaQPy69_26fDs-fwLkEH39eWSiMC2yd0sSPGa5MQBllDim-b16J8b81kvGXuYXPUXvxbttS9Ylur9FnpZymcSbd_8pmSwgGosmctH2oNVq8Hk4xcN3Jps_LryeCsdvTrbpx_BsvgWXtLSMt5cBbXyAgiVX68"/>

<span class="material-symbols-outlined">radio_button_unchecked</span>
</div>
</div>
</div>
</button>
<!-- Option 4: Genussmoment -->
<button class="group relative overflow-hidden rounded-xl bg-surface-container-low hover:scale-95 transition-transform duration-300 flex flex-col text-left md:col-span-2">

<div class="md:w-3/5 aspect-[16/9] md:aspect-auto overflow-hidden">
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" data-alt="Dark atmospheric setting with a single spotlight on a luxury coffee bean selection and a crystal glass" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCiBurZCHZ924vo0bmWlSOD4hOBCJMZvihcq1AAwSLyYZ1d9kyf3bgjgYDX0R1hYm4cPnCeqJePEy6OZB0VJdKAqe3UeUnjimSo1O0kLT4cs2eRYlEHfkoR5yvD6nna3giObzCWICUamFWqrrYjuy2w-lPyzHD7ZShnz2C2NKIYncSfTHQRWU9KDgcuP0bwH9pI3qTpdV4XR_aerXEm7toLDsoI4JK2_PmOFOAbxbvGcs5QqqaAGYxqkILAXvz9kaDG17cKv-EJMvmT"/>

<div class="mt-6 w-12 h-12 rounded-full border border-outline-variant flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">radio_button_unchecked</span>
</div>
</div>
</div>
</button>
</div>

<button class="flex items-center justify-center text-[#341706] opacity-30 dark:text-[#fdf9f4] hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-size: 32px;">arrow_back</span>
</button>
<!-- Subtle help text -->
<div class="hidden md:block mb-1">
<p class="font-sans uppercase tracking-[0.05em] text-[10px] text-[#341706] opacity-40">Wähle eine Option um fortzufahren</p>
</div>
<button class="flex items-center justify-center bg-[#341706] text-[#fdf9f4] rounded-full w-12 h-12 dark:bg-[#fdf9f4] dark:text-[#341706] hover:scale-110 transition-transform shadow-lg">
