            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        }

<body class="bg-background text-on-background font-body selection:bg-secondary-fixed">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#fdf9f4] dark:bg-[#1a0b03]">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-2 hover:opacity-70 transition-opacity cursor-pointer scale-95 transition-transform duration-300">
<span class="material-symbols-outlined text-[#341706] dark:text-[#fdf9f4]">close</span>
</div>
<h1 class="font-notoserif font-normal tracking-tight text-lg font-serif italic text-[#341706] dark:text-[#fdf9f4]">Digital Sommelier</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</div>
</header>
<main class="min-h-screen pt-24 pb-32 flex flex-col items-center px-6">
<!-- Progress Indicator -->
<div class="w-full max-w-xl mb-16 px-4">
<div class="flex justify-between items-center mb-4">
<span class="text-[10px] font-sans uppercase tracking-[0.1em] text-outline">Entdeckung</span>
<span class="text-[10px] font-sans uppercase tracking-[0.1em] text-primary">85%</span>
</div>
<div class="h-[2px] w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary transition-all duration-700 ease-in-out" style="width: 85%;"></div>
</div>
</div>
<!-- Headline Section -->
<div class="w-full max-w-3xl text-center mb-16">
<h2 class="font-headline text-4xl md:text-5xl lg:text-6xl text-primary leading-tight tracking-tight mb-4">
                Möchtest du Neues entdecken?
            </h2>
<p class="text-on-surface-variant font-light tracking-wide max-w-md mx-auto">
                Deine Vorliebe für Abwechslung hilft uns, die perfekte Bohnen-Rotation für deinen Gaumen zu kuratieren.
            </p>
</div>
<!-- Options Container: Asymmetric Grid -->
<div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
<!-- Option 1: Immer Neues -->
<button class="group relative aspect-[4/5] overflow-hidden rounded-xl bg-surface-container-lowest transition-all duration-500 hover:shadow-2xl hover:-translate-y-2">

<div class="absolute inset-0 bg-gradient-to-t from-primary/80 via-primary/20 to-transparent"></div>
<div class="absolute bottom-0 left-0 p-8 text-left w-full">
<span class="inline-block px-3 py-1 bg-secondary text-on-primary text-[9px] uppercase tracking-widest rounded-full mb-3 opacity-0 group-hover:opacity-100 transition-opacity">Abenteuer</span>
<h3 class="font-headline text-2xl text-on-primary">Immer Neues</h3>
</div>
</button>
<!-- Option 2: Mischung (Featured Large) -->
<button class="group relative aspect-[4/5] overflow-hidden rounded-xl bg-surface-container-lowest transition-all duration-500 hover:shadow-2xl hover:-translate-y-2 ring-2 ring-secondary/20">
<img alt="Artistic overhead shot of two different coffee cups and roasted beans arranged symmetrically" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-80 group-hover:opacity-100" data-alt="Artistic overhead shot of two different coffee cups and roasted beans arranged symmetrically on a warm wood background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlJLgZqiGTyCvTmHzoVmvB-LTobogoxp7QA7PoWdoyKaJ3Q_hOsr14Ua2jH6EGlnGCqxuHWgNS4KphrjFt7HePYn9dTCoce565KmzIMLePUpQWGk4dlxPyIOj2Fyr_xqCUq-gmwFs3HtaFjGrXiL0kWgBED63F6yBXwSc-q_9xsgLw5XH6e-gfgEMDgq1dg4ejLhyeuSPC-mtk8VUsQvQzXB9daaTl1tsncDWd16EW25DRCHOIzg86IfzECQOjsoNXCqqaM6EPmJtv"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 via-primary/20 to-transparent"></div>
<div class="absolute bottom-0 left-0 p-8 text-left w-full">
<span class="inline-block px-3 py-1 bg-secondary text-on-primary text-[9px] uppercase tracking-widest rounded-full mb-3">Balance</span>
<h3 class="font-headline text-2xl text-on-primary">Mischung aus Bekannt &amp; Neu</h3>
<div class="mt-2 h-1 w-12 bg-secondary rounded-full"></div>
</div>
</button>
<!-- Option 3: Lieber konstant -->

<img alt="Minimalist scene of a single perfect steaming espresso cup in a soft sunlit morning setting" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-80 group-hover:opacity-100" data-alt="Minimalist scene of a single perfect steaming espresso cup in a soft sunlit morning setting with warm shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDE9-BfEbcYF78DxCZRsYSXFQ7SIGg1ztTdt_EpIfOwZCMzGeRCFCs64sqewDfUGQu4Htf78kF1kJlcMRwku3x3NgM5Pzmf_XgHJ0impwMmw6uTLy7m2mptXRYPgdMr4DyZLV27yn5fo0d6OV3FVjKCXOffKyoaSDDhhNjOFdgCTTNgOTphsquRIFixJ_zldSxeO2l0nE0nEYsFCwLkKle5YMG7eOAXyylzOW6Pb78f4brKbzowLiAMOfpimOQw1CFIvktRmyYSCX9"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 via-primary/20 to-transparent"></div>
<div class="absolute bottom-0 left-0 p-8 text-left w-full">
<span class="inline-block px-3 py-1 bg-secondary text-on-primary text-[9px] uppercase tracking-widest rounded-full mb-3 opacity-0 group-hover:opacity-100 transition-opacity">Vertraut</span>

<div class="flex items-center justify-center text-[#341706] opacity-30 dark:text-[#fdf9f4] hover:scale-110 transition-transform cursor-pointer pointer-events-auto">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</div>
<!-- Forward Button (Active) -->
<div class="flex items-center justify-center bg-[#341706] text-[#fdf9f4] rounded-full w-12 h-12 dark:bg-[#fdf9f4] dark:text-[#341706] hover:scale-110 transition-transform Active:scale-90 duration-200 cursor-pointer pointer-events-auto">
<span class="material-symbols-outlined">arrow_forward</span>
</div>
</nav>
<!-- Background Decorative Elements -->
<div class="fixed top-1/4 -right-20 w-96 h-96 bg-surface-container-high rounded-full blur-[100px] -z-10 opacity-40"></div>
<div class="fixed -bottom-20 -left-20 w-[500px] h-[500px] bg-secondary-fixed/10 rounded-full blur-[120px] -z-10 opacity-30"></div>
