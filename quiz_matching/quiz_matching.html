        }

            border: none !important;
        }
        .glass-surface {
            background: rgba(253, 249, 244, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<!-- TopAppBar (Transactional: Minimal Branding) -->
<header class="fixed top-0 w-full z-50 bg-[#fdf9f4] dark:bg-[#1a0b03] no-border-architecture">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-screen-xl mx-auto">
<button class="text-[#341706] dark:text-[#fdf9f4] hover:opacity-70 transition-opacity scale-95 transition-transform duration-300">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="text-lg font-serif italic text-[#341706] dark:text-[#fdf9f4] font-notoserif font-normal tracking-tight">Digital Sommelier</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="min-h-screen flex flex-col items-center justify-center px-6 pt-20 pb-32 overflow-hidden relative">
<!-- Subtle Ambient Background Element -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] aspect-square rounded-full opacity-5 pointer-events-none" style="background: radial-gradient(circle, #795900 0%, transparent 70%);"></div>
<!-- Progress Visualizer Section -->
<div class="w-full max-w-xl flex flex-col items-center gap-12 relative z-10">
<!-- Analysis Visual Anchor -->
<div class="relative group">
<div class="w-48 h-48 rounded-full bg-surface-container-low flex items-center justify-center p-4 shadow-sm relative overflow-hidden">
<img alt="Coffee beans on silk" class="w-full h-full object-cover rounded-full opacity-20" data-alt="Macro close-up of dark roasted coffee beans scattered on a cream-colored silk fabric with soft dramatic light and shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDDnJykg5M7h_WkqgJBmvoFxfgGM2_DsvoGv5R49x_grqH2ZFAuxIYLSwzQeWIIrEocXyhHjjHq30L6v68uKNDPzl1sUqEfxc9WTH4WUiCtbVxHFL3u6CA9AUpxdolrNT6zGLofR3YBTgmKt-T71dLE4y6DEyBeIMiRqq7SQTJWByLP20BkQmwRhQzuxcI1rvZjZfdnKMTdtqz2AgY5G39hd_prcwQyl7dBH0HJnTx9eaS-BvbxIdsAgm1RNUKXYXKkoL8SrtdhNjtf"/>
<!-- Progress Ring -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-outline-variant opacity-10" cx="96" cy="96" fill="transparent" r="92" stroke="currentColor" stroke-width="2"></circle>
<circle class="text-secondary" cx="96" cy="96" fill="transparent" r="92" stroke="currentColor" stroke-dasharray="578" stroke-dashoffset="0" stroke-width="3"></circle>
</svg>
<!-- Icon / Brand Mark -->
<div class="relative z-10 text-primary">
<span class="material-symbols-outlined text-5xl" data-icon="temp_preferences_custom" data-weight="fill">temp_preferences_custom</span>
</div>
</div>
</div>
<!-- Typography Header -->
<div class="text-center space-y-4 max-w-md">
<h2 class="text-3xl md:text-4xl font-headline font-normal tracking-tight text-primary">
                    Wir finden deinen perfekten Match...
                </h2>
<div class="inline-flex items-center gap-2 px-4 py-1.5 bg-surface-container-highest rounded-full">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
<p class="text-xs font-label uppercase tracking-[0.08em] font-bold text-on-surface-variant">
                        Analysiere dein Profil: <span class="text-primary">[Vibrant Explorer]</span>
</p>
</div>
</div>
<!-- Bento Grid of Analysis Points -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full mt-8">
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_32px_32px_rgba(52,23,6,0.04)] flex items-start gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="coffee_maker">coffee_maker</span>
<div>
<p class="text-xs font-label uppercase tracking-widest text-outline mb-1">Methode</p>
<p class="text-sm font-medium text-primary">V60 &amp; Pour Over Optimierung</p>
</div>
</div>
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_32px_32px_rgba(52,23,6,0.04)] flex items-start gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="psychology">psychology</span>
<div>
<p class="text-xs font-label uppercase tracking-widest text-outline mb-1">Geschmackssensorik</p>
<p class="text-sm font-medium text-primary">Zitrische Säure &amp; Florale Noten</p>
</div>
</div>
</div>
<!-- Progress Percentage -->
<div class="flex flex-col items-center gap-2">
<span class="text-5xl font-headline font-normal text-primary">100%</span>
<p class="text-xs font-label uppercase tracking-[0.2em] text-secondary font-bold">Analyse Abgeschlossen</p>
</div>
</div>
</main>
<!-- BottomNavBar (Task-Focused / Navigation Shell) -->
<nav class="fixed bottom-0 w-full z-50 pb-8 flex justify-between px-10 items-end bg-transparent no-border-architecture">
<!-- Inactive Back Button -->
<button class="flex items-center justify-center text-[#341706] opacity-30 dark:text-[#fdf9f4] hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="arrow_back">arrow_back</span>
</button>
<!-- Centered Active Primary Action (Simulated by UI intent) -->
<div class="flex flex-col items-center">
<button class="flex items-center justify-center bg-[#341706] text-[#fdf9f4] rounded-full w-14 h-14 dark:bg-[#fdf9f4] dark:text-[#341706] hover:scale-110 transition-transform shadow-xl">
<span class="material-symbols-outlined text-3xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<span class="mt-2 text-[10px] font-sans uppercase tracking-[0.05em] text-primary">Ergebnis anzeigen</span>
</div>
<div class="w-10"></div> <!-- Placeholder to balance visual weight -->
</nav>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 h-screen w-1/3 pointer-events-none z-[-1] opacity-20">
<img alt="Vapor steam from coffee" class="w-full h-full object-cover" data-alt="Soft wispy white steam rising against a dark espresso colored background with atmospheric warm backlighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGboyFEXaO7SmrdqUE3XYLxzFpr64D6L7foSML03IwtCVz8PWVYgeMCzVk1N21PczyqTTxZXuqwyAhdUQa7TumUMBSzQlt5T81FgSiIKADT5tpux6WCxxXfV_oFXdgNqXOuOBeJyoxVfFZ5KS8tiNvcZxbSfqXP7cRDFpn54Hj8dQmNwQZC2Ciw_c5Gu5vnfwyURWfCLLRNbSHXKtHM3c8coZ1GA8JrfIIymPsWh6UrT33ePH2XbL9To4-HFzOocPgOXBy3d1XKKQR"/>
</div>
<script>
document.addEventListener('click', function(e) {
    var t = e.target.closest('button, [class*="cursor-pointer"], a');
    if (!t) return;
    var txt = t.textContent.toLowerCase();
    // Back
    if (txt.includes('zurück') || txt.includes('arrow_back') || t.querySelector('[data-icon="arrow_back"]')) {
        e.preventDefault(); window.location.href = '/quiz_frequency/'; return;
    }
    // Forward / next / result
    if (txt.includes('weiter') || txt.includes('quiz starten') || txt.includes('ergebnis anzeigen') || txt.includes('arrow_forward') || t.querySelector('[data-icon="arrow_forward"]')) {
        e.preventDefault(); window.location.href = '/quiet_luxury_match_result/'; return;
    }
    // If it's an option card in main
    if (t.closest('main') && (t.tagName === 'BUTTON' || t.hasAttribute('class') && t.getAttribute('class').includes('cursor-pointer'))) {
        window.location.href = '/quiet_luxury_match_result/';
    }
});
</script>
</body></html>
